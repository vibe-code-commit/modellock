# Optional workflow that can open issues/PRs when ModelLock finds drift.
# Uses narrowly scoped write permissions. Do not use as the default.

name: ModelLock with PR

on:
  schedule:
    - cron: "41 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  modellock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
      - name: Install ModelLock
        run: npm install -g modellock@latest
      - name: Update proposal
        run: modellock update --no-network
      - name: Create pull request for lockfile proposal
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          commit-message: "chore: propose llm.lock.json update"
          title: "chore: ModelLock lockfile update"
          body: |
            Automated ModelLock update proposal.

            Review `llm.lock.report.md` before merging.
            Source code was never sent off the runner.
          branch: modellock/update
          add-paths: |
            llm.lock.proposed.json
            llm.lock.report.md
