name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static docs site
        run: |
          mkdir -p _site
          cp README.md _site/index.md
          cp -r docs _site/docs
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>ModelLock</title></head><body>' > _site/index.html
          echo '<h1>ModelLock</h1><p>See <a href="https://github.com/${{ github.repository }}">the repository</a> and the docs/ folder.</p><ul>' >> _site/index.html
          for f in docs/*.md; do
            base=$(basename "$f")
            echo "<li><a href=\"docs/$base\">$base</a></li>" >> _site/index.html
          done
          echo '</ul></body></html>' >> _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
