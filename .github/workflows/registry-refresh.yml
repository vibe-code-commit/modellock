name: Registry refresh

on:
  schedule:
    # Jitter away from top-of-hour stampede
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Refresh registry from public sources
        id: refresh
        run: npm run registry:refresh
        continue-on-error: true
      - name: Open diagnostic issue on schema breakage
        if: steps.refresh.outcome == 'failure'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const path = 'data/registry/DIAGNOSTIC.md';
            const body = fs.existsSync(path)
              ? fs.readFileSync(path, 'utf8')
              : 'Registry refresh failed. See workflow logs.';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Registry refresh diagnostic (${new Date().toISOString().slice(0,10)})`,
              body,
            });
      - name: Commit updated snapshot when invariants pass
        if: steps.refresh.outcome == 'success'
        run: |
          git config user.name "modellock-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/registry || true
          if git diff --staged --quiet; then
            echo "No registry changes to commit"
          else
            git commit -m "chore: refresh registry snapshot"
            git push
          fi
